name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # Package.swift declares `swift-tools-version: 6.3`, and the suite uses the
    # `Testing` framework (Swift 6+). The macos-26 image ships Xcode 26.x (Swift
    # 6.3.x) by default; macos-14/15 only reach Swift 5.10/6.0–6.2 and fail the
    # tools-version check.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: make build

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Export LCOV
        run: |
          PROFDATA=$(find .build -name "default.profdata" | head -1)
          XCTEST=$(find .build -name "unbreakPackageTests.xctest" -type d | head -1)
          TESTBIN="$XCTEST/Contents/MacOS/unbreakPackageTests"
          xcrun llvm-cov export "$TESTBIN" \
            --instr-profile="$PROFDATA" \
            --ignore-filename-regex="\.build|Tests" \
            --format=lcov > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false

      - name: Format check
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive --strict Sources Tests Package.swift
          else
            echo "swift-format not available on runner; skipping"
          fi

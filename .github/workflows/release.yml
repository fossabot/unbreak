name: Release (bottle)

# Builds a Homebrew bottle (a prebuilt binary) on a tagged release so `brew
# install` downloads the ~650KB binary instead of compiling from source — which
# is what drags in the Xcode Command Line Tools. The bottle links only against
# system libraries + the OS-shipped Swift runtime (macOS 13+), so it needs no
# toolchain on the user's machine.
#
# The hashes inside a `bottle do` block can only exist after the bottle is built,
# so this job *generates* that block (correct OS tag + sha256) and attaches it to
# the release. The maintainer then pastes it into the tap formula — see
# docs/RELEASING.md. The job uploads the bottle tarball as a release asset; the
# formula's `root_url` points back at exactly that location.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload the bottle asset

jobs:
  bottle:
    # Must match CI: Package.swift is swift-tools-version 6.3 and the suite uses
    # the Testing framework, which only the macos-26 image ships (Swift 6.3.x).
    # The bottle is therefore tagged for that runner's arch+OS; older macOS (down
    # to the Package's .macOS(.v13) floor) falls back to Homebrew's older-bottle
    # reuse, then to the source build if no compatible bottle exists.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve tag/version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      # Build from a throwaway local tap so `brew bottle` has a tapped formula to
      # work against. The committed formula lives *inside* this repo's source
      # tarball, so its `sha256` can't match that tarball (the field is part of
      # what's hashed). Sidestep that by computing the tag tarball's real digest
      # now and injecting url+sha into the tap copy only — the committed formula's
      # source fields are irrelevant to the bottle build.
      - name: Stage formula in a local tap with this tag's real source sha
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          url="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          sha="$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')"
          echo "Source tarball sha256: ${sha}"
          brew tap-new local/unbreak --no-git
          dest="$(brew --repository local/unbreak)/Formula/unbreak.rb"
          cp Formula/unbreak.rb "$dest"
          # BSD sed (macOS runner). Anchor at line start so the source `url`/`version`
          # lines are hit but the bottle block's `root_url` (ends in "url") is not;
          # the bottle block's `sha256 cellar: …` also stays untouched. Version is
          # tag-driven so the bottle's Cellar path matches the asset filename.
          sed -i '' -E "s|^([[:space:]]*)version \"[^\"]*\"|\1version \"${VERSION}\"|" "$dest"
          sed -i '' -E "s|^([[:space:]]*)url \"[^\"]*\"|\1url \"${url}\"|" "$dest"
          sed -i '' -E "s|^([[:space:]]*)sha256 \"[^\"]*\"|\1sha256 \"${sha}\"|" "$dest"

      - name: Build & relabel the bottle
        id: build
        env:
          ROOT_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # The formula's install recipe builds a UNIVERSAL (arm64 + x86_64) binary,
          # so this one bottle carries both slices.
          brew install --build-bottle local/unbreak/unbreak
          brew bottle --json --no-rebuild --root-url="${ROOT_URL}" local/unbreak/unbreak
          # `brew bottle` tags the bottle for the build OS (tahoe). Relabel to the
          # OLDEST supported macOS — ventura, matching Package.swift .macOS(.v13) —
          # because Homebrew reuses a bottle tagged for an older OS on newer systems
          # (never the reverse, never across archs). The binary's deployment target
          # is v13, so the label is accurate; `:any_skip_relocation` means no OS/path
          # is baked into the tarball, so the rename is sound.
          #
          # Publish the SAME universal tarball under BOTH arch tags so Intel Macs
          # pour a bottle too: arm64_ventura serves Apple Silicon 13+, ventura serves
          # Intel 13+. The files are byte-identical copies (no arch/path baked in),
          # so they share one sha256 — emitted on both bottle-block lines.
          built=$(ls unbreak--*.bottle.tar.gz)
          arm="unbreak-${VERSION}.arm64_ventura.bottle.tar.gz"
          intel="unbreak-${VERSION}.ventura.bottle.tar.gz"
          mv "$built" "$arm"
          cp "$arm" "$intel"
          sha=$(shasum -a 256 "$arm" | awk '{print $1}')
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Universal bottle published as:"
          echo "  ${arm}  (sha256 ${sha})"
          echo "  ${intel} (sha256 ${sha}, identical copy)"

      - name: Emit the bottle block
        env:
          ROOT_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}
          SHA: ${{ steps.build.outputs.sha }}
        run: |
          {
            echo '## `bottle do` block — paste into Formula/unbreak.rb (this repo + the tap)'
            echo ''
            echo '```ruby'
            echo '  bottle do'
            echo "    root_url \"${ROOT_URL}\""
            echo "    sha256 cellar: :any_skip_relocation, arm64_ventura: \"${SHA}\""
            echo "    sha256 cellar: :any_skip_relocation, ventura:       \"${SHA}\""
            echo '  end'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create / update the GitHub release with the bottle
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # A hyphenated tag (e.g. v0.1.2-rc1) is a prerelease; a plain vX.Y.Z is final.
          prerelease=""
          case "$TAG" in *-*) prerelease="--prerelease" ;; esac
          gh release create "$TAG" --title "$TAG" --generate-notes $prerelease ./*.bottle.tar.gz \
            || gh release upload "$TAG" ./*.bottle.tar.gz --clobber

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly published advisories surface even without a push.
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (Swift)
    # CodeQL's Swift extractor only runs on macOS, and the build needs the same
    # Swift 6.3 toolchain as CI (see ci.yml) — macos-26 ships Xcode 26.x.
    runs-on: macos-26
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: make build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:swift"

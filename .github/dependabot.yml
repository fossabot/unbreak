version: 2
updates:
  # Group all GitHub Actions bumps into a single weekly PR to limit noise.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
  # Group all Swift package bumps into a single weekly PR.
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      swift:
        patterns: ["*"]
